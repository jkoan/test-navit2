# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Doxygen

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["trunk"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Doxygen Action
        # You may pin to the exact commit or the version.
        # uses: mattnotmitt/doxygen-action@cbe72c8e402e8a3faa1f0b247ef90aa6c8e4ce74
        uses: mattnotmitt/doxygen-action@1.9.8
        with:
          # Path to Doxyfile
          doxyfile-path: ./Doxyfile # default is ./Doxyfile
          # Working directory
          working-directory: navit # default is .
          # Generate latex documentation
          #enable-latex: # optional
          # Extra alpine packages for the build environment
          #additional-packages: # optional, default is 
      - name: Find
        run: find -type f
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: doc/html

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

